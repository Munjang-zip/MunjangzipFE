name: Android CI (PR)

on:
  pull_request:
    branches: [ develop, main ]
    # 문서만 바뀌었을 때는 CI 생략하려면 paths 설정을 쓰세요
    paths:
      - '**/*.kt'
      - '**/*.kts'
      - 'app/**'
      - 'build.gradle*'
      - 'settings.gradle*'
      - 'gradle/**'
      - 'gradle.properties'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Gradle 캐시 & 빌드 스캔 친화 (권장)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Android SDK 설치 & 라이선스 동의 (빌드툴 자동 설치 기반)
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          install-build-tools: true
          components: |
            build-tools;34.0.0
            platforms;android-34

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 빌드 + 유닛테스트 + Lint + Debug APK 생성
      - name: Build, Test, Lint
        run: |
          ./gradlew --no-daemon --stacktrace clean \
            lintDebug \
            testDebugUnitTest \
            assembleDebug

      # 결과물( APK / 테스트리포트 / Lint 리포트 ) 업로드
      - name: Upload artifacts (APK & reports)
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: |
            **/build/outputs/apk/debug/*.apk
            **/build/reports/tests/testDebugUnitTest/**
            **/build/reports/lint-results-*.html
            **/build/reports/lint-results-*.xml
